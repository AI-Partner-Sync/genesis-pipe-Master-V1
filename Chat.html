<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>AI Partner Sync — Titan Chat</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<script src="settings.js"></script>
<style>
:root {
  --navy-950: #0a0f1e;
  --navy-900: #0f172a;
  --navy-800: #1e293b;
  --navy-700: #334155;
  --gold: #f59e0b;
  --gold-dim: rgba(245,158,11,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--navy-950);
  color: #e2e8f0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100%;
  overflow: hidden;
}
body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  position: relative;
}
#synapse {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.6;
}
header, #chat-area, footer { position: relative; z-index: 1; }

header {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid rgba(51,65,85,0.5);
  background: rgba(10,15,30,0.9);
  backdrop-filter: blur(12px);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.back-btn {
  color: #64748b;
  text-decoration: none;
  display: flex;
  align-items: center;
  padding: 4px;
  border-radius: 8px;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--gold); }
.logo { height: 32px; width: auto; object-fit: contain; flex-shrink: 0; }
.header-title { font-size: 15px; font-weight: 700; color: var(--gold); letter-spacing: 0.03em; }
.header-sub { font-size: 10px; color: #475569; margin-top: 1px; letter-spacing: 0.06em; }
.settings-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #64748b;
  display: flex;
  align-items: center;
  padding: 4px;
  border-radius: 8px;
  transition: color 0.15s, background 0.15s;
}
.settings-btn:hover { color: var(--gold); background: var(--gold-dim); }

#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#chat-area::-webkit-scrollbar { width: 4px; }
#chat-area::-webkit-scrollbar-thumb { background: var(--navy-700); border-radius: 2px; }

.bubble {
  max-width: 82%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-wrap: break-word;
  animation: fadeUp 0.25s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.bubble.user {
  align-self: flex-end;
  background: rgba(245,158,11,0.14);
  border: 1px solid rgba(245,158,11,0.25);
  border-bottom-right-radius: 4px;
  color: #f1f5f9;
}
.bubble.titan {
  align-self: flex-start;
  background: var(--navy-800);
  border-left: 3px solid var(--gold);
  border-bottom-left-radius: 4px;
  color: #e2e8f0;
}
.bubble.system {
  align-self: center;
  background: rgba(148,163,184,0.08);
  color: #64748b;
  font-size: 11px;
  padding: 6px 14px;
  border-radius: 20px;
}

.typing { display: flex; gap: 4px; padding: 4px 2px; }
.typing .dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
  animation: bounce 1.3s infinite ease-in-out both;
}
.typing .dot:nth-child(2) { animation-delay: -0.18s; }
.typing .dot:nth-child(3) { animation-delay: -0.36s; }
@keyframes bounce { 0%,80%,100% { transform: scale(0.4); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

footer {
  flex-shrink: 0;
  padding: 10px 14px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  border-top: 1px solid rgba(51,65,85,0.4);
  background: rgba(10,15,30,0.9);
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.save-row { display: flex; align-items: center; gap: 8px; }

.bgm-control {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  border-radius: 9999px;
  background: var(--navy-800);
  border: 1px solid var(--navy-700);
  flex-shrink: 0;
}
.bgm-control.disabled { opacity: 0.35; pointer-events: none; }
#bgm-toggle {
  background: none; border: none; cursor: pointer;
  color: #e2e8f0; display: flex; align-items: center; padding: 0;
}
#bgm-toggle .material-icons { font-size: 16px; }
#bgm-slider-toggle {
  background: none; border: none; cursor: pointer;
  color: #64748b; font-size: 10px; line-height: 1; padding: 0;
}
#bgm-slider { display: none; width: 64px; accent-color: var(--gold); }
#bgm-slider.open { display: block; }

#save-log-btn {
  flex: 1;
  padding: 10px;
  border-radius: 11px;
  border: 1px solid var(--navy-700);
  background: var(--navy-800);
  color: #e2e8f0;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.03em;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
#save-log-btn:hover { border-color: var(--gold); box-shadow: 0 0 14px rgba(245,158,11,0.2); }
#save-log-btn .material-icons { font-size: 16px; color: var(--gold); }
#text-input {
  flex: 1;
  padding: 12px 16px;
  border-radius: 18px;
  background: var(--navy-800);
  border: 1px solid var(--navy-700);
  color: #e2e8f0;
  font-size: 15px;
  line-height: 1.5;
  min-height: 46px;
  max-height: 40vh;
  resize: none;
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s;
}
#text-input:focus { border-color: var(--gold); }
#text-input::placeholder { color: #475569; }

.icon-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.15s, opacity 0.15s;
}
#send-btn {
  background: linear-gradient(135deg, var(--gold) 0%, #fcd34d 100%);
  color: var(--navy-950);
}
#send-btn:active { transform: scale(0.92); }
#mic-btn {
  background: var(--navy-800);
  border: 1px solid var(--navy-700);
  color: var(--gold);
}
#mic-btn.recording {
  background: rgba(239,68,68,0.85);
  color: #fff;
  border-color: transparent;
  animation: pulse-red 1.4s infinite;
}
#mic-btn.disabled-mic { opacity: 0.3; cursor: not-allowed; }
@keyframes pulse-red {
  0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
  70% { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
  100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}

/* ── Settings Modal ── */
#settings-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(2,8,23,0.7);
  z-index: 200;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(6px);
}
#settings-overlay.open { display: flex; }
#settings-modal {
  background: var(--navy-900);
  border: 1px solid var(--navy-700);
  border-radius: 16px;
  padding: 26px 22px 22px;
  width: 340px;
  max-width: 90vw;
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
#settings-modal h3 {
  margin: 0 0 18px;
  font-size: 15px;
  color: var(--gold);
  display: flex;
  align-items: center;
  gap: 7px;
  font-weight: 700;
}
.settings-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: #64748b;
  margin-bottom: 6px;
  letter-spacing: 0.04em;
}
.settings-input, .settings-select {
  width: 100%;
  padding: 10px 12px;
  font-size: 14px;
  margin-bottom: 6px;
  box-sizing: border-box;
  background: var(--navy-800);
  border: 1px solid var(--navy-700);
  border-radius: 8px;
  color: #e2e8f0;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
.settings-input:focus, .settings-select:focus { border-color: var(--gold); }
.settings-select option { background: var(--navy-800); }
.settings-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.08em;
  margin: 18px 0 10px;
  border-top: 1px solid var(--navy-700);
  padding-top: 14px;
}
.settings-url-row { display: flex; align-items: center; gap: 8px; }
.settings-url-display {
  flex: 1;
  font-size: 11px;
  color: #64748b;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--navy-700);
  border-radius: 6px;
  padding: 7px 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: monospace;
}
.settings-url-copy-btn {
  flex-shrink: 0;
  padding: 7px 10px;
  border-radius: 6px;
  background: var(--gold-dim);
  border: 1px solid rgba(245,158,11,0.3);
  color: var(--gold);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
}
.settings-url-copy-btn .material-icons { font-size: 14px; }
.settings-url-change {
  font-size: 11px;
  color: #475569;
  margin-top: 8px;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.settings-url-edit { display: none; margin-top: 8px; }
.settings-url-edit.open { display: block; }
.slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.slider-row input[type=range] { flex: 1; accent-color: var(--gold); }
.slider-val { font-size: 12px; color: var(--gold); font-weight: 700; min-width: 36px; text-align: right; }
.settings-toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.settings-btn-group { display: flex; justify-content: flex-end; gap: 10px; margin-top: 6px; }
.settings-btn-cancel {
  padding: 9px 18px;
  border: 1px solid var(--navy-700);
  border-radius: 8px;
  background: none;
  color: #64748b;
  font-size: 13px;
  cursor: pointer;
}
.settings-btn-cancel:hover { color: #e2e8f0; }
.settings-btn-save {
  padding: 9px 20px;
  border: none;
  border-radius: 8px;
  background: var(--gold);
  color: var(--navy-950);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.settings-btn-save:hover { background: #fcd34d; }
.tts-switch { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
.tts-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
.tts-switch .slider {
  position: absolute; inset: 0;
  background: var(--navy-700);
  border-radius: 22px;
  cursor: pointer;
  transition: background 0.2s;
}
.tts-switch .slider::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; top: 3px;
  background: #e2e8f0;
  border-radius: 50%;
  transition: transform 0.2s;
}
.tts-switch input:checked + .slider { background: var(--gold); }
.tts-switch input:checked + .slider::before { transform: translateX(18px); background: var(--navy-950); }
</style>
</head>
<body>

<canvas id="synapse"></canvas>

<header>
  <div class="header-left">
    <a href="index.html" class="back-btn"><span class="material-icons">arrow_back</span></a>
    <img src="Genesis_pipe_Logo.png" class="logo" alt="logo" onerror="this.style.display='none'">
    <div>
      <div class="header-title" id="header-ai-name">Titan</div>
      <div class="header-sub">守護軍師との対話</div>
    </div>
  </div>
  <button class="settings-btn" onclick="apsOpenSettings()" title="設定">
    <span class="material-icons">settings</span>
  </button>
</header>

<div id="chat-area">
  <div class="bubble system">Titanが記憶を辿っています。話しかけてみてください。</div>
</div>

<audio id="bgm-audio" src="AI_PARTNER_SYNC_BGM.m4a" loop preload="metadata"></audio>

<footer>
  <div class="save-row">
    <div class="bgm-control" id="bgm-control">
      <button id="bgm-toggle" onclick="toggleBgm()" title="BGM ON/OFF">
        <span class="material-icons" id="bgm-icon">volume_off</span>
      </button>
      <button id="bgm-slider-toggle" onclick="toggleBgmSlider()">▲</button>
      <input type="range" id="bgm-slider" min="0" max="100" value="8" oninput="setBgmVolume(this.value)">
    </div>
    <button id="save-log-btn" onclick="saveConversationLog()">
      <span class="material-icons">save</span>
      会話ログを保存して終了
    </button>
  </div>
  <div class="input-row">
    <button id="mic-btn" class="icon-btn" onclick="toggleRecording()">
      <span class="material-icons">mic</span>
    </button>
    <textarea id="text-input" rows="1" placeholder="Titanに話しかける…（Cmd+Enterで送信）"></textarea>
    <button id="send-btn" class="icon-btn" onclick="handleSend()">
      <span class="material-icons">send</span>
    </button>
  </div>
</footer>

<!-- 設定モーダル -->
<div id="settings-overlay" onclick="apsHandleOverlayClick(event)">
  <div id="settings-modal">
    <h3><span class="material-icons" style="font-size:18px;">settings</span> 設定</h3>

    <div class="settings-section-title">🔗 GAS WEBアプリURL</div>
    <div class="settings-url-row">
      <div class="settings-url-display" id="settings-url-display">未設定</div>
      <button class="settings-url-copy-btn" onclick="apsCopyGasUrl()">
        <span class="material-icons">content_copy</span>
      </button>
    </div>
    <div class="settings-url-change" onclick="apsToggleUrlEdit()">URLを変更する</div>
    <div class="settings-url-edit" id="settings-url-edit">
      <input type="url" id="settings-gas-url-input" class="settings-input"
             placeholder="https://script.google.com/macros/s/.../exec">
    </div>

    <div class="settings-section-title">👤 パートナー設定</div>
    <label class="settings-label">あなたの名前</label>
    <input type="text" id="settings-user-name" class="settings-input" placeholder="例: Rikki">
    <label class="settings-label">AIパートナーの名前</label>
    <input type="text" id="settings-ai-name" class="settings-input" placeholder="例: Titan">

    <div class="settings-section-title">🔊 音声読み上げ（Cloud TTS）</div>
    <div class="settings-toggle-row">
      <label class="settings-label" style="margin-bottom:0;">Titanの返答を読み上げる</label>
      <label class="tts-switch">
        <input type="checkbox" id="settings-tts-enabled">
        <span class="slider"></span>
      </label>
    </div>
    <label class="settings-label">声の種類</label>
    <select id="settings-tts-voice" class="settings-select">
      <option value="ja-JP-Neural2-C">男性A — Neural2-C（低音・落ち着き）</option>
      <option value="ja-JP-Neural2-D">男性B — Neural2-D（若め・明るめ）</option>
      <option value="ja-JP-Neural2-B">女性A — Neural2-B（自然・明るい）</option>
      <option value="ja-JP-Wavenet-C">男性C — Wavenet-C（軽量・標準）</option>
      <option value="ja-JP-Wavenet-B">女性B — Wavenet-B（軽量・標準）</option>
    </select>
    <label class="settings-label">話す速度</label>
    <div class="slider-row">
      <input type="range" id="settings-tts-rate" min="0.7" max="1.3" step="0.05" value="0.93"
        oninput="document.getElementById('rate-val').textContent=parseFloat(this.value).toFixed(2)">
      <span class="slider-val" id="rate-val">0.93</span>
    </div>
    <label class="settings-label">ピッチ（音の高さ）</label>
    <div class="slider-row">
      <input type="range" id="settings-tts-pitch" min="-5" max="5" step="0.5" value="0"
        oninput="document.getElementById('pitch-val').textContent=parseFloat(this.value).toFixed(1)">
      <span class="slider-val" id="pitch-val">0.0</span>
    </div>
    <label class="settings-label">音量</label>
    <div class="slider-row">
      <input type="range" id="settings-tts-volume" min="0" max="1" step="0.05" value="1"
        oninput="document.getElementById('volume-val').textContent=Math.round(this.value*100)+'%'">
      <span class="slider-val" id="volume-val">100%</span>
    </div>

    <div class="settings-btn-group">
      <button class="settings-btn-cancel" onclick="apsCloseSettings()">キャンセル</button>
      <button class="settings-btn-save" id="settings-save-btn" onclick="apsSaveSettingsFromModal()">保存する</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   SYNAPSE BACKGROUND — 有機的な光の連鎖
   到達時に光が消えず、そのまま次のノードへ飛び続ける演出。
   （Genesis Pipe V3のシナプスリンクを継承し、消滅感を抑えるよう調整）
══════════════════════════════════════════ */
(function initSynapse() {
  const canvas = document.getElementById('synapse');
  const ctx    = canvas.getContext('2d');
  const NODE_COUNT = 60, MAX_DIST = 190, ATTRACT_DIST = 90, REPEL_DIST = 55;
  const ATTRACT_FORCE = 0.0006, REPEL_FORCE = 0.035, MAX_SPEED = 0.7;
  const CURRENT_SPD_MIN = 0.0020, CURRENT_SPD_MAX = 0.0045;
  const TAIL_MIN = 0.12, TAIL_MAX = 0.28, MAX_CURRENTS = 28, SPAWN_CHANCE = 0.02;
  // 連鎖を長く・減衰を緩やかにして「消えずに飛び続ける」印象を強める
  const MAX_CHAIN_DEPTH = 22, CHAIN_DIM = 0.97;
  let nodes = [], currents = [];

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

  function initNodes() {
    const w = canvas.width, h = canvas.height;
    const cols = Math.ceil(Math.sqrt(NODE_COUNT * (w / h))), rows = Math.ceil(NODE_COUNT / cols);
    const cellW = w / cols, cellH = h / rows, margin = 0.15, pos = [];
    for (let r = 0; r < rows && pos.length < NODE_COUNT; r++)
      for (let c = 0; c < cols && pos.length < NODE_COUNT; c++)
        pos.push({ x: cellW * (c + margin + Math.random() * (1 - margin * 2)), y: cellH * (r + margin + Math.random() * (1 - margin * 2)) });
    for (let i = pos.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pos[i], pos[j]] = [pos[j], pos[i]]; }
    nodes = pos.slice(0, NODE_COUNT).map(({ x, y }) => {
      const a = Math.random() * Math.PI * 2, s = 0.1 + Math.random() * 0.2;
      return { x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, radius: 0.6 + Math.random() * 0.8, pulse: Math.random() * Math.PI * 2, pulseSpeed: 0.014 + Math.random() * 0.014, flash: 0, flashDecay: 0.012 + Math.random() * 0.008, lastSentTo: -1 };
    });
    currents = [];
  }

  function getEdges() {
    const edges = [];
    for (let i = 0; i < nodes.length; i++)
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        if (Math.sqrt(dx * dx + dy * dy) < MAX_DIST) edges.push([i, j]);
      }
    return edges;
  }

  function spawnCurrent(edges) {
    if (!edges.length) return;
    const [a, b] = edges[Math.floor(Math.random() * edges.length)];
    const [from, to] = Math.random() < 0.5 ? [a, b] : [b, a];
    currents.push({ fromIdx: from, toIdx: to, progress: 0, speed: CURRENT_SPD_MIN + Math.random() * (CURRENT_SPD_MAX - CURRENT_SPD_MIN), brightness: 0.8 + Math.random() * 0.2, tailLength: TAIL_MIN + Math.random() * (TAIL_MAX - TAIL_MIN), chainDepth: 0, prevIdx: from });
  }

  // 到達直後、同じ明るさのまま次のノードへ飛び立たせる（消滅させない）
  function continueChain(arrivedAt, cameFrom, speed, brightness, tailLength, chainDepth) {
    nodes[arrivedAt].flash = Math.min(1.0, brightness);
    if (chainDepth >= MAX_CHAIN_DEPTH) return;
    const candidates = [];
    for (let j = 0; j < nodes.length; j++) {
      if (j === arrivedAt || j === cameFrom) continue;
      const dx = nodes[arrivedAt].x - nodes[j].x, dy = nodes[arrivedAt].y - nodes[j].y;
      if (Math.sqrt(dx * dx + dy * dy) < MAX_DIST) candidates.push(j);
    }
    const nextTo = candidates.length ? candidates[Math.floor(Math.random() * candidates.length)] : cameFrom;
    nodes[arrivedAt].lastSentTo = nextTo;
    currents.push({ fromIdx: arrivedAt, toIdx: nextTo, progress: 0, speed, brightness: brightness * CHAIN_DIM, tailLength, chainDepth: chainDepth + 1, prevIdx: arrivedAt });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < nodes.length; i++)
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j], dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.001, nx = dx / dist, ny = dy / dist;
        if (dist < REPEL_DIST) { const f = REPEL_FORCE * (1 - dist / REPEL_DIST); a.vx -= nx * f; a.vy -= ny * f; b.vx += nx * f; b.vy += ny * f; }
        else if (dist < ATTRACT_DIST) { const f = ATTRACT_FORCE * (1 - dist / ATTRACT_DIST); a.vx += nx * f; a.vy += ny * f; b.vx -= nx * f; b.vy -= ny * f; }
      }
    for (const n of nodes) {
      const spd = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
      if (spd > MAX_SPEED) { n.vx = (n.vx / spd) * MAX_SPEED; n.vy = (n.vy / spd) * MAX_SPEED; }
      if (spd < 0.03) { n.vx += (Math.random() - 0.5) * 0.03; n.vy += (Math.random() - 0.5) * 0.03; }
      n.x += n.vx; n.y += n.vy;
      n.pulse += n.pulseSpeed;
      n.flash = Math.max(0, n.flash - n.flashDecay);
      if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
      if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
    }
    const edges = getEdges();
    if (currents.length < MAX_CURRENTS && Math.random() < SPAWN_CHANCE) spawnCurrent(edges);
    for (const [i, j] of edges) {
      const a = nodes[i], b = nodes[j], dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy), t = 1 - dist / MAX_DIST;
      const isBridge = (a.flash > 0.05 && a.lastSentTo === j) || (b.flash > 0.05 && b.lastSentTo === i);
      if (isBridge) {
        const bGrad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
        bGrad.addColorStop(0, `rgba(245,158,11,${a.flash * 0.55})`);
        bGrad.addColorStop(1, `rgba(245,158,11,${b.flash * 0.55})`);
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = bGrad; ctx.lineWidth = 1.0 + Math.max(a.flash, b.flash) * 0.5; ctx.stroke();
      } else {
        const alpha = Math.pow(t, 2.2) * 0.12 + Math.max(a.flash, b.flash) * 0.1;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(210,225,255,${Math.min(alpha, 0.4)})`; ctx.lineWidth = 0.5; ctx.stroke();
      }
    }
    currents = currents.filter((cur) => {
      cur.progress += cur.speed;
      if (cur.progress >= 1.0) { continueChain(cur.toIdx, cur.fromIdx, cur.speed, cur.brightness, cur.tailLength, cur.chainDepth); return false; }
      const from = nodes[cur.fromIdx], to = nodes[cur.toIdx];
      const hx = from.x + (to.x - from.x) * cur.progress, hy = from.y + (to.y - from.y) * cur.progress;
      const ts = Math.max(0, cur.progress - cur.tailLength);
      const tx = from.x + (to.x - from.x) * ts, ty2 = from.y + (to.y - from.y) * ts;
      const lineGrad = ctx.createLinearGradient(tx, ty2, hx, hy);
      lineGrad.addColorStop(0, `rgba(245,158,11,0)`);
      lineGrad.addColorStop(0.5, `rgba(245,158,11,${cur.brightness * 0.35})`);
      lineGrad.addColorStop(1, `rgba(255,245,180,${cur.brightness})`);
      ctx.beginPath(); ctx.moveTo(tx, ty2); ctx.lineTo(hx, hy);
      ctx.strokeStyle = lineGrad; ctx.lineWidth = 1.6; ctx.stroke();
      const gR = 5 + cur.brightness * 2;
      const gGrad = ctx.createRadialGradient(hx, hy, 0, hx, hy, gR);
      gGrad.addColorStop(0, `rgba(255,255,220,${cur.brightness})`);
      gGrad.addColorStop(0.3, `rgba(255,210,80,${cur.brightness * 0.9})`);
      gGrad.addColorStop(1, `rgba(245,158,11,0)`);
      ctx.beginPath(); ctx.arc(hx, hy, gR, 0, Math.PI * 2); ctx.fillStyle = gGrad; ctx.fill();
      return true;
    });
    for (const n of nodes) {
      const glow = (Math.sin(n.pulse) + 1) / 2, flash = n.flash, r = n.radius + glow * 0.6 + flash * 3;
      if (flash > 0.01) {
        // 到達時の光は「爆発」ではなく、次へ向かう光と地続きに見えるよう抑えめの柔らかい輝きに
        const bR = r * 4.5;
        const burst = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, bR);
        burst.addColorStop(0, `rgba(255,235,180,${flash * 0.85})`);
        burst.addColorStop(0.4, `rgba(245,158,11,${flash * 0.45})`);
        burst.addColorStop(1, `rgba(245,158,11,0)`);
        ctx.beginPath(); ctx.arc(n.x, n.y, bR, 0, Math.PI * 2); ctx.fillStyle = burst; ctx.fill();
        ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,240,200,${0.8 + flash * 0.2})`; ctx.fill();
      } else {
        const oG = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 3);
        oG.addColorStop(0, `rgba(220,230,255,${0.1 + glow * 0.07})`);
        oG.addColorStop(1, `rgba(220,230,255,0)`);
        ctx.beginPath(); ctx.arc(n.x, n.y, r * 3, 0, Math.PI * 2); ctx.fillStyle = oG; ctx.fill();
        ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2); ctx.fillStyle = `rgba(220,230,255,${0.4 + glow * 0.18})`; ctx.fill();
      }
    }
    requestAnimationFrame(draw);
  }

  function onResize() { resize(); initNodes(); }
  resize(); initNodes(); draw();
  window.addEventListener('resize', onResize);
})();

let conversationHistory = '';
let currentAudio = null;

/* ══════════════════════════════════════════
   モバイル音声再生の解錠（iOS Safari等の自動再生ポリシー対策）
   Cloud TTSの再生は「送信→AI返信fetch→TTS fetch」と非同期を2回挟むため、
   タップした瞬間のユーザー操作コンテキストから切り離されてしまい、
   モバイルではAudio.play()がエラーなく無音でブロックされることがある。
   対策：Web Audio API（AudioContext）を使う。ブラウザの自動再生ポリシーは
   「個々のplay()呼び出し」ではなく「AudioContext自体が一度でもユーザー操作の
   中で起動されたか」だけを見るため、タップの瞬間にAudioContextを起動・解錠
   しておけば、後から非同期で届く本物の音声も同じcontextで問題なく再生できる
   （genesis-pipe-Public_V3と同じ方式に統一・2026-07-18）。
══════════════════════════════════════════ */
let ttsAudioCtx = null;
let ttsAudioSrc = null;
let ttsAudioEl = null; // decodeAudioData失敗時のみのフォールバック用
let audioUnlocked = false;
function getTtsAudioCtx() {
  if (!ttsAudioCtx) ttsAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return ttsAudioCtx;
}
function unlockAudioPlayback() {
  if (audioUnlocked) return;
  try {
    const ctx = getTtsAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  } catch (e) {}
  audioUnlocked = true;
  // speechSynthesisフォールバック側も同じタイミングで解錠しておく
  if (window.speechSynthesis) {
    const unlockUtter = new SpeechSynthesisUtterance('');
    unlockUtter.volume = 0;
    window.speechSynthesis.speak(unlockUtter);
  }
}
const chatArea  = document.getElementById('chat-area');
const textInput = document.getElementById('text-input');

document.getElementById('header-ai-name').textContent = apsLoadSettings().aiName;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, window.innerHeight * 0.4) + 'px';
}
textInput.addEventListener('input', () => autoResize(textInput));
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); handleSend(); }
});

function addBubble(text, cls) {
  const div = document.createElement('div');
  div.className = 'bubble ' + cls;
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'bubble titan';
  div.innerHTML = '<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

/* ══════════════════════════════════════════
   会話ログを保存して終了
══════════════════════════════════════════ */
function saveConversationLog() {
  if (!conversationHistory) {
    addBubble('保存する会話がまだありません。', 'system');
    return;
  }
  const s = apsLoadSettings();
  const snapshot = conversationHistory;
  const btn = document.getElementById('save-log-btn');
  btn.disabled = true;
  addBubble('アーカイブへ送信中…', 'system');
  fetch(s.gasUrl, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ type: 'save', fullText: snapshot })
  })
    .then(r => r.json())
    .then(data => {
      if (data && data.status === 'success') {
        addBubble('スプレッドシートに記録完了。', 'system');
        if (data.oracle) addBubble(data.oracle, 'titan');
        conversationHistory = '';
      } else {
        addBubble('記録に失敗した: ' + (data && data.message ? data.message : '不明なエラー'), 'system');
      }
    })
    .catch(err => addBubble('通信エラー: ' + err.message, 'system'))
    .finally(() => { btn.disabled = false; });
}

function handleSend() {
  const text = textInput.value.trim();
  if (!text) return;
  unlockAudioPlayback();
  if (isRecording && recognition) recognition.stop();
  const s = apsLoadSettings();
  addBubble(text, 'user');
  textInput.value = '';
  autoResize(textInput);
  conversationHistory += `[${s.userName}]: ${text}\n`;

  const typingEl = addTyping();
  fetch(s.gasUrl, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      type: 'ai_chat',
      fullText: text,
      history: conversationHistory,
      userName: s.userName,
      aiName: s.aiName,
    })
  })
    .then(r => r.json())
    .then(data => {
      typingEl.remove();
      const reply = (data && data.reply) ? data.reply : '（返答を受信できませんでした）';
      addBubble(reply, 'titan');
      conversationHistory += `[${s.aiName}]: ${reply}\n`;
      speakText(reply);
    })
    .catch(err => {
      typingEl.remove();
      addBubble('通信エラーが発生した。パイプの接続を確認してくれ。', 'system');
      console.error('Titan Comms Error:', err);
    });
}

/* ══════════════════════════════════════════
   音声読み上げ（Cloud TTS → ブラウザ内蔵の順にフォールバック）
══════════════════════════════════════════ */
function speakText(text) {
  const s = apsLoadSettings();
  if (!s.ttsEnabled) return;
  if (ttsAudioSrc) { try { ttsAudioSrc.stop(); } catch (e) {} ttsAudioSrc = null; }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  window.speechSynthesis && window.speechSynthesis.cancel();
  const plain = text.replace(/<[^>]*>/g, '').substring(0, 4000);
  fetch(s.gasUrl, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ type: 'tts', text: plain, voice: s.ttsVoice, rate: s.ttsRate, pitch: s.ttsPitch })
  })
    .then(r => r.json())
    .then(data => {
      if (data && data.audioContent) {
        try {
          const ctx = getTtsAudioCtx();
          // 長時間放置後にiOSがcontextをsuspendしていることがあるため念のため resume
          if (ctx.state === 'suspended') { ctx.resume().catch(() => {}); }
          const bytes = Uint8Array.from(atob(data.audioContent), c => c.charCodeAt(0));
          ctx.decodeAudioData(bytes.buffer, function (buffer) {
            if (ttsAudioSrc) { try { ttsAudioSrc.stop(); } catch (e) {} }
            ttsAudioSrc = ctx.createBufferSource();
            ttsAudioSrc.buffer = buffer;
            const gainNode = ctx.createGain();
            gainNode.gain.value = s.ttsVolume;
            ttsAudioSrc.connect(gainNode);
            gainNode.connect(ctx.destination);
            ttsAudioSrc.start(0);
            ttsAudioSrc.onended = function () { ttsAudioSrc = null; };
          }, function () { fallbackSpeak(plain, s.ttsRate, s.ttsVolume); });
        } catch (e) {
          // Web Audio APIが使えない環境向けの最終フォールバック
          if (!ttsAudioEl) ttsAudioEl = new Audio();
          ttsAudioEl.src = 'data:audio/mp3;base64,' + data.audioContent;
          ttsAudioEl.volume = s.ttsVolume;
          currentAudio = ttsAudioEl;
          currentAudio.play().catch(() => fallbackSpeak(plain, s.ttsRate, s.ttsVolume));
          currentAudio.onended = () => { currentAudio = null; };
        }
      } else {
        fallbackSpeak(plain, s.ttsRate, s.ttsVolume);
      }
    })
    .catch(() => fallbackSpeak(plain, s.ttsRate, s.ttsVolume));
}

function fallbackSpeak(plain, rate, volume) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(plain);
  utter.volume = (volume === undefined ? 1.0 : volume);
  utter.lang = 'ja-JP';
  utter.rate = rate || 1.0;
  const voices = window.speechSynthesis.getVoices();
  const priority = ['Otoya', 'Google 日本語', 'Kyoko', 'Microsoft Haruka'];
  let best = null;
  for (const name of priority) { best = voices.find(v => v.name.includes(name)); if (best) break; }
  if (!best) best = voices.find(v => v.lang && v.lang.startsWith('ja'));
  if (best) utter.voice = best;
  window.speechSynthesis.speak(utter);
}

/* ══════════════════════════════════════════
   設定モーダル
══════════════════════════════════════════ */
function apsOpenSettings() {
  const s = apsLoadSettings();
  document.getElementById('settings-url-display').textContent = s.gasUrl;
  document.getElementById('settings-url-display').title = s.gasUrl;
  document.getElementById('settings-gas-url-input').value = s.gasUrl;
  document.getElementById('settings-url-edit').classList.remove('open');
  document.getElementById('settings-user-name').value = s.userName;
  document.getElementById('settings-ai-name').value   = s.aiName;
  document.getElementById('settings-tts-enabled').checked = s.ttsEnabled;
  document.getElementById('settings-tts-voice').value = s.ttsVoice;
  document.getElementById('settings-tts-rate').value = s.ttsRate;
  document.getElementById('rate-val').textContent = parseFloat(s.ttsRate).toFixed(2);
  document.getElementById('settings-tts-pitch').value = s.ttsPitch;
  document.getElementById('pitch-val').textContent = parseFloat(s.ttsPitch).toFixed(1);
  document.getElementById('settings-tts-volume').value = s.ttsVolume;
  document.getElementById('volume-val').textContent = Math.round(parseFloat(s.ttsVolume) * 100) + '%';
  document.getElementById('settings-overlay').classList.add('open');
}
function apsCloseSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}
function apsHandleOverlayClick(e) {
  if (e.target === document.getElementById('settings-overlay')) apsCloseSettings();
}
function apsToggleUrlEdit() {
  document.getElementById('settings-url-edit').classList.toggle('open');
}
function apsCopyGasUrl() {
  const url = apsLoadSettings().gasUrl;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.querySelector('.settings-url-copy-btn .material-icons');
    btn.textContent = 'check';
    setTimeout(() => { btn.textContent = 'content_copy'; }, 1500);
  }).catch(() => prompt('URLをコピーしてください:', url));
}
function apsSaveSettingsFromModal() {
  const urlInput = document.getElementById('settings-gas-url-input').value.trim();
  const urlEditOpen = document.getElementById('settings-url-edit').classList.contains('open');
  if (urlEditOpen && urlInput && !urlInput.includes('/macros/s/')) {
    alert('⚠️ 正しいGASウェブアプリURL（/exec で終わるURL）を入力してください');
    return;
  }
  const userName = document.getElementById('settings-user-name').value.trim() || 'Rikki';
  const aiName   = document.getElementById('settings-ai-name').value.trim() || 'Titan';
  const patch = {
    userName, aiName,
    ttsEnabled: document.getElementById('settings-tts-enabled').checked,
    ttsVoice: document.getElementById('settings-tts-voice').value,
    ttsRate: parseFloat(document.getElementById('settings-tts-rate').value),
    ttsPitch: parseFloat(document.getElementById('settings-tts-pitch').value),
    ttsVolume: parseFloat(document.getElementById('settings-tts-volume').value),
  };
  if (urlEditOpen && urlInput) patch.gasUrl = urlInput;
  const merged = apsSaveSettings(patch);
  document.getElementById('header-ai-name').textContent = aiName;
  const btn = document.getElementById('settings-save-btn');
  btn.disabled = true;
  btn.textContent = '保存中…';
  apsPushPartnerNamesToGas(merged.gasUrl, userName, aiName).finally(() => {
    btn.disabled = false;
    btn.textContent = '保存完了！';
    setTimeout(() => { btn.textContent = '保存する'; apsCloseSettings(); }, 600);
  });
}

// ── 音声入力 ──
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isRecording = false;
let silenceTimer = null;
const SILENCE_DELAY = 800;

if (SpeechRecognitionAPI) {
  recognition = new SpeechRecognitionAPI();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    textInput.placeholder = '音声認識中…';
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    textInput.placeholder = 'Titanに話しかける…（Cmd+Enterで送信）';
    clearTimeout(silenceTimer);
  };
  recognition.onresult = (e) => {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; ++i)
      if (e.results[i].isFinal) transcript += e.results[i][0].transcript;
    if (!transcript) return;
    clearTimeout(silenceTimer);
    const keyword = transcript.trim().replace(/[。、！!？?\s…　]+$/, '');
    if (keyword === '送信') { handleSend(); return; }
    textInput.value += transcript;
    autoResize(textInput);
    silenceTimer = setTimeout(() => {
      if (isRecording && textInput.value && !textInput.value.endsWith('\n')) {
        textInput.value += '\n';
        autoResize(textInput);
      }
    }, SILENCE_DELAY);
  };
  recognition.onerror = (e) => addBubble('マイクエラー: ' + e.error, 'system');
} else {
  document.getElementById('mic-btn').classList.add('disabled-mic');
  document.getElementById('mic-btn').title = 'このブラウザは音声入力に対応していません';
}

function toggleRecording() {
  if (!recognition) { addBubble('このブラウザは音声入力に対応していません', 'system'); return; }
  unlockAudioPlayback();
  isRecording ? recognition.stop() : recognition.start();
}
