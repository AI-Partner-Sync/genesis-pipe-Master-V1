<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Partner Sync — Master Timeline Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="settings.js"></script>
<style>
:root {
  --navy-950: #0a0f1e;
  --navy-900: #0f172a;
  --navy-800: #1e293b;
  --navy-700: #334155;
  --gold: #f59e0b;
  --annual-c: #a855f7;
  --monthly-c: #38bdf8;
  --weekly-c: #34d399;
  --daily-c: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--navy-950);
  color: #e2e8f0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
}

/* ヘッダー */
header {
  background: var(--navy-900);
  border-bottom: 1px solid var(--navy-700);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { width: 40px; height: 40px; border-radius: 8px; object-fit: contain; flex-shrink: 0; }
header h1 { font-size: 16px; font-weight: 700; color: var(--gold); letter-spacing: 0.05em; }
.subtitle { font-size: 11px; color: #475569; margin-top: 2px; }
.header-right { font-size: 11px; color: #475569; }

/* グラフエリア */
.chart-section {
  padding: 20px 24px;
  background: var(--navy-900);
  border-bottom: 1px solid var(--navy-700);
}
.section-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.chart-wrapper { position: relative; height: 150px; }

/* フィルターバー */
.filter-bar {
  padding: 12px 24px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  background: var(--navy-900);
  border-bottom: 1px solid var(--navy-700);
  position: sticky;
  top: 61px;
  z-index: 99;
}
.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--navy-700);
  background: transparent;
  color: #64748b;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.03em;
}
.filter-btn:hover { border-color: var(--gold); color: var(--gold); }
.filter-btn.all.active     { background: var(--gold);      border-color: var(--gold);      color: var(--navy-950); }
.filter-btn.annual.active  { background: var(--annual-c);  border-color: var(--annual-c);  color: #fff; }
.filter-btn.monthly.active { background: var(--monthly-c); border-color: var(--monthly-c); color: var(--navy-950); }
.filter-btn.weekly.active  { background: var(--weekly-c);  border-color: var(--weekly-c);  color: var(--navy-950); }
.filter-btn.daily.active   { background: var(--daily-c);   border-color: var(--daily-c);   color: var(--navy-950); }

/* タイムライン */
.timeline {
  padding: 28px 24px 100px;
  position: relative;
  max-width: 860px;
  margin: 0 auto;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 48px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, var(--gold) 0%, rgba(245,158,11,0.1) 60%, transparent 100%);
}

/* エントリー */
.entry {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 0.35s ease forwards;
}
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

/* ドット */
.dot-wrap {
  flex-shrink: 0;
  width: 40px;
  display: flex;
  justify-content: center;
  padding-top: 16px;
  position: relative;
  z-index: 1;
}
.dot {
  border-radius: 50%;
  border: 2px solid;
  background: var(--navy-950);
}
.dot.Annual  { width: 18px; height: 18px; border-color: var(--annual-c);  box-shadow: 0 0 10px var(--annual-c); }
.dot.Monthly { width: 14px; height: 14px; border-color: var(--monthly-c); box-shadow: 0 0 6px var(--monthly-c); }
.dot.Weekly  { width: 11px; height: 11px; border-color: var(--weekly-c); }
.dot.Daily   { width: 8px;  height: 8px;  border-color: var(--daily-c); }

/* カード */
.card {
  flex: 1;
  background: var(--navy-800);
  border-radius: 10px;
  border-left: 3px solid;
  padding: 12px 16px;
  min-width: 0;
  transition: box-shadow 0.3s;
}
.card.Annual  { border-left-color: var(--annual-c); }
.card.Monthly { border-left-color: var(--monthly-c); }
.card.Weekly  { border-left-color: var(--weekly-c); }
.card.Daily   { border-left-color: var(--daily-c); }
.card.highlight { box-shadow: 0 0 0 2px var(--gold); }

.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.badge {
  font-size: 9px;
  font-weight: 800;
  padding: 2px 7px;
  border-radius: 8px;
  letter-spacing: 0.06em;
}
.badge.Annual  { background: var(--annual-c);  color: #fff; }
.badge.Monthly { background: var(--monthly-c); color: var(--navy-950); }
.badge.Weekly  { background: var(--weekly-c);  color: var(--navy-950); }
.badge.Daily   { background: var(--daily-c);   color: var(--navy-950); }

.card-date  { font-size: 12px; color: #64748b; }
.date-range { font-size: 10px; color: #475569; }

.emotion-pill {
  margin-left: auto;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  white-space: nowrap;
}
.eg  { background: rgba(245,158,11,0.15); color: #f59e0b; }
.eg2 { background: rgba(52,211,153,0.15); color: #34d399; }
.eg3 { background: rgba(251,146,60,0.15); color: #fb923c; }
.eg4 { background: rgba(248,113,113,0.15);color: #f87171; }

.summary {
  font-size: 13px;
  color: #cbd5e1;
  line-height: 1.65;
  margin-bottom: 6px;
}

.toggle-btn {
  font-size: 11px;
  color: #475569;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color 0.15s;
}
.toggle-btn:hover { color: var(--gold); }

.detail {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--navy-700);
}
.detail.open { display: block; }

.detail-row { margin-bottom: 10px; }
.detail-label {
  font-size: 9px;
  color: #475569;
  font-weight: 700;
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.detail-value { font-size: 12px; color: #94a3b8; line-height: 1.6; }

.kw-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
.kw { font-size: 10px; padding: 2px 7px; background: var(--navy-700); border-radius: 6px; color: #94a3b8; }

.loading, .empty {
  text-align: center;
  padding: 80px 20px;
  color: #475569;
  font-size: 14px;
  line-height: 2;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--navy-700);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="Genesis_pipe_Logo.png" class="logo" alt="logo" onerror="this.style.display='none'">
    <div>
      <h1>AI Partner Sync</h1>
      <div class="subtitle">Master Timeline — Growth Record</div>
    </div>
  </div>
  <div class="header-right" id="entry-count"></div>
</header>

<div class="chart-section">
  <div class="section-label">DAILY EMOTION ARC</div>
  <div class="chart-wrapper">
    <canvas id="emotionChart"></canvas>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn all active" onclick="setFilter('ALL')">ALL</button>
  <button class="filter-btn annual"     onclick="setFilter('Annual')">Annual</button>
  <button class="filter-btn monthly"    onclick="setFilter('Monthly')">Monthly</button>
  <button class="filter-btn weekly"     onclick="setFilter('Weekly')">Weekly</button>
  <button class="filter-btn daily"      onclick="setFilter('Daily')">Daily</button>
</div>

<div class="timeline" id="timeline">
  <div class="loading">
    <div class="spinner"></div>
    データを読み込み中...
  </div>
</div>

<script>
let allEntries = [];
let currentFilter = 'ALL';
let emotionChart = null;

async function loadData() {
  try {
    const gasUrl = apsLoadSettings().gasUrl;
    const sep = gasUrl.includes('?') ? '&' : '?';
    const res = await fetch(gasUrl + sep + 'page=timeline_data');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allEntries = Array.isArray(data) ? data : [];
    buildChart(allEntries.filter(e => e.level === 'Daily'));
    render();
    document.getElementById('entry-count').textContent = allEntries.length + ' entries';
  } catch(err) {
    document.getElementById('timeline').innerHTML =
      `<div class="empty">データ取得に失敗しました。<br>
      <small style="color:#334155">${err.message}</small><br><br>
      <small>index.html の設定（⚙️）からGAS URLを確認してください。</small></div>`;
    console.error(err);
  }
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    const cls = [...b.classList].find(c => c !== 'filter-btn' && c !== 'active') || '';
    const match = (f === 'ALL' && cls === 'all') || cls === f.toLowerCase();
    b.classList.toggle('active', match);
  });
  render();
}

function render() {
  const entries = currentFilter === 'ALL'
    ? allEntries
    : allEntries.filter(e => e.level === currentFilter);

  const tl = document.getElementById('timeline');
  if (!entries.length) {
    tl.innerHTML = '<div class="empty">表示できるデータがありません</div>';
    return;
  }
  tl.innerHTML = entries.map((e, i) => buildCard(e, i, allEntries.indexOf(e))).join('');
}

function buildCard(e, animIdx, globalIdx) {
  const delay = Math.min(animIdx * 35, 600);

  // 感情ピル（Daily のみ）
  let pillHtml = '';
  if (e.level === 'Daily' && e.score) {
    const cls = e.score >= 500 ? 'eg' : e.score >= 350 ? 'eg2' : e.score >= 200 ? 'eg3' : 'eg4';
    pillHtml = `<span class="emotion-pill ${cls}">${esc(e.emotion)} ${e.score}</span>`;
  }

  const dateHtml = e.date_range
    ? `<span class="card-date">${esc(e.date)}</span><span class="date-range"> ${esc(e.date_range)}</span>`
    : `<span class="card-date">${esc(e.date)}</span>`;

  const fields = [
    ['INSIGHT',      e.insight],
    ['KEYSTONE',     e.keystone],
    ['TOP3 ACTUAL',  e.top3_actual],
    ['TOP3 PLAN',    e.top3_plan],
    ['ACTIONS',      e.actions],
    ['TEACHING',     e.teaching],
    ['BREAKTHROUGH', e.major_breakthrough],
    ['IDENTITY',     e.identity_evolution],
    ['PHILOSOPHY',   e.year_philosophy],
    ['LEGACY',       e.legacy_testament],
    ['APHORISM',     e.aphorism],
  ].filter(([, v]) => v);

  const detailRows = fields.map(([label, val]) =>
    `<div class="detail-row">
      <div class="detail-label">${label}</div>
      <div class="detail-value">${esc(val)}</div>
    </div>`
  ).join('');

  const kwHtml = e.keywords
    ? `<div class="detail-row">
        <div class="detail-label">KEYWORDS</div>
        <div class="kw-wrap">${
          e.keywords.split(/[,\s　]+/).filter(k => k)
            .map(k => `<span class="kw">${esc(k)}</span>`).join('')
        }</div>
      </div>`
    : '';

  const hasDetail = fields.length > 0 || e.keywords;

  return `
<div class="entry" id="entry-${globalIdx}" style="animation-delay:${delay}ms">
  <div class="dot-wrap"><div class="dot ${e.level}"></div></div>
  <div class="card ${e.level}">
    <div class="card-header">
      <span class="badge ${e.level}">${e.level.toUpperCase()}</span>
      ${dateHtml}
      ${pillHtml}
    </div>
    <div class="summary">${esc(e.summary)}</div>
    ${hasDetail ? `
    <button class="toggle-btn" onclick="toggleDetail(${globalIdx},this)">▶ 詳細を見る</button>
    <div class="detail" id="detail-${globalIdx}">
      ${detailRows}${kwHtml}
    </div>` : ''}
  </div>
</div>`;
}

function toggleDetail(id, btn) {
  const el = document.getElementById('detail-' + id);
  const open = el.classList.toggle('open');
  btn.textContent = open ? '▼ 閉じる' : '▶ 詳細を見る';
}

function buildChart(dailyEntries) {
  const sorted = [...dailyEntries]
    .filter(e => e.date)
    .sort((a, b) => new Date(a.date) - new Date(b.date));

  if (!sorted.length) return;

  const labels = sorted.map(e => e.date.substring(5));
  const scores = sorted.map(e => e.score || 0);
  const pointColors = scores.map(s =>
    s >= 500 ? '#f59e0b' : s >= 350 ? '#34d399' : s >= 200 ? '#fb923c' : '#f87171'
  );

  const ctx = document.getElementById('emotionChart').getContext('2d');
  if (emotionChart) emotionChart.destroy();

  emotionChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: scores,
        borderColor: 'rgba(245,158,11,0.7)',
        backgroundColor: (context) => {
          const grad = context.chart.ctx.createLinearGradient(0, 0, 0, 150);
          grad.addColorStop(0, 'rgba(245,158,11,0.15)');
          grad.addColorStop(1, 'rgba(245,158,11,0)');
          return grad;
        },
        pointBackgroundColor: pointColors,
        pointBorderColor: pointColors,
        pointRadius: 4,
        pointHoverRadius: 7,
        tension: 0.35,
        fill: true,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e293b',
          titleColor: '#94a3b8',
          bodyColor: '#e2e8f0',
          callbacks: {
            title: (items) => sorted[items[0].dataIndex].date,
            label: (item) => {
              const e = sorted[item.dataIndex];
              return ` ${e.emotion || '—'} (${e.score})`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#475569', font: { size: 9 }, maxTicksLimit: 12, maxRotation: 0 },
          grid:  { color: 'rgba(51,65,85,0.4)' },
          border: { color: 'transparent' }
        },
        y: {
          min: 0, max: 1200,
          ticks: { color: '#475569', font: { size: 9 }, stepSize: 200 },
          grid:  { color: 'rgba(51,65,85,0.4)' },
          border: { color: 'transparent' }
        }
      },
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const target = sorted[elements[0].index];
        const entryIdx = allEntries.findIndex(
          e => e.date === target.date && e.level === 'Daily'
        );
        if (entryIdx < 0) return;
        if (currentFilter !== 'ALL' && currentFilter !== 'Daily') setFilter('Daily');
        setTimeout(() => {
          const el = document.getElementById('entry-' + entryIdx);
          if (!el) return;
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          const card = el.querySelector('.card');
          card.classList.add('highlight');
          setTimeout(() => card.classList.remove('highlight'), 1800);
        }, 120);
      }
    }
  });
}

function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
}

window.onload = loadData;
</script>
</body>
</html>
